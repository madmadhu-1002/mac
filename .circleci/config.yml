version: 2.1

jobs:
  build:
    macos:
      xcode: "15.3.0"   # or latest supported
    resource_class: m1.medium
    working_directory: ~/project

    steps:
      - checkout

      - run:
          name: Install Tailscale
          command: |
            brew update
            brew install tailscale

      - run:
          name: Start Tailscale
          command: |
            sudo tailscaled --state=tailscaled.state &
            sleep 5
            sudo tailscale up \
              --authkey=tskey-auth-kWyi656VFi11CNTRL-1GUhv73gRu6LxEEorHGUu6XWKQ9BcoZ8 \
              --hostname=circleci-macos-runner \
              --ssh

      - run:
          name: Show Tailscale IP
          command: tailscale ip -4

      - run:
          name: Enable SSH
          command: sudo systemsetup -setremotelogin on

      - run:
          name: Install Ollama CLI
          command: |
            brew install ollama
            ollama --version

      - run:
          name: Start Ollama Server
          command: |
            nohup ollama serve > ollama.log 2>&1 &
            sleep 10

      - run:
          name: Pull Model
          command: ollama pull qwen2.5-coder:3b

      - run:
          name: Test Prompt
          command: |
            curl http://localhost:11434/api/generate \
              -H "Content-Type: application/json" \
              -d '{
                "model": "qwen2.5-coder:3b",
                "prompt": "hy",
                "stream": false
              }'

      - run:
          name: Keep Runner Alive
          no_output_timeout: 360m
          command: |
            echo "Runner ready"
            sleep 21600

workflows:
  version: 2
  macos_workflow:
    jobs:
      - macos-ssh
