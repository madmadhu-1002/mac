version: 2.1

jobs:
  macos-ssh:
    macos:
      xcode: "15.0.0"   # choose available version in CircleCI docs
    resource_class: macos.m1.medium.gen1
    working_directory: ~/project
    timeout: 360m

    steps:
      - checkout

      # ----------------------------
      # Install Tailscale
      # ----------------------------
      - run:
          name: Install Tailscale
          command: |
            brew update
            brew install tailscale

      - run:
          name: Start Tailscale
          command: |
            sudo tailscaled --state=tailscaled.state &
            sleep 5
            sudo tailscale up \
              --authkey=${TAILSCALE_AUTH_KEY} \
              --hostname=circleci-macos-runner \
              --ssh

      - run:
          name: Show Tailscale IP
          command: tailscale ip -4

      # ----------------------------
      # Enable SSH
      # ----------------------------
      - run:
          name: Enable SSH
          command: sudo systemsetup -setremotelogin on

      # ----------------------------
      # Install Ollama
      # ----------------------------
      - run:
          name: Install Ollama CLI
          command: |
            brew install ollama
            which ollama
            ollama --version

      # ----------------------------
      # Start Ollama
      # ----------------------------
      - run:
          name: Start Ollama Server
          command: |
            nohup ollama serve > ollama.log 2>&1 &
            sleep 10
            curl http://localhost:11434/api/tags || true

      # ----------------------------
      # Pull Model
      # ----------------------------
      - run:
          name: Pull Model
          command: ollama pull qwen2.5-coder:3b

      # ----------------------------
      # Test Prompt
      # ----------------------------
      - run:
          name: Test Prompt
          command: |
            curl http://localhost:11434/api/generate \
              -H "Content-Type: application/json" \
              -d '{
                "model": "qwen2.5-coder:3b",
                "prompt": "hy",
                "stream": false,
                "options": { "num_ctx": 8192 }
              }'

      # ----------------------------
      # Keep Runner Alive
      # ----------------------------
      - run:
          name: Keep Runner Alive
          command: |
            echo "Runner ready with Ollama + Tailscale"
            sleep 21600

workflows:
  version: 2
  macos_workflow:
    jobs:
      - macos-ssh
